<div class="page">
  <h1>Harry Potter Characters</h1>
  <p>Count: {{ characters().length }}</p>
  <div class="grid">
    @for (character of characters(); track character.id) {
      <div class="card">
        <img
          [src]="character.image || 'https://placehold.co/150x200?text=No+Image'"
          [alt]="character.name"
        />
        <div class="info">
          <h2>{{ character.name }}</h2>
          <p>{{ character.house || 'Unknown House' }}</p>
        </div>
      </div>
    }
  </div>
</div>
